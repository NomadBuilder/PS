

<div class="program-service__form">
    <form id="programs-services-form" action="#">
        <div class="form-block">
            <div class="form-block__item -ml0">
                <label htmlFor="">Who is it for</label>

                <select class="form-select" id="program-subcategory" name="SelectedSubcategory"><option value="">Select</option>
<option value="Adults">Adults</option>
<option value="Children and Teens">Children and teens</option>
<option value="Indigenous">Indigenous</option>
</select>
            </div>
            <div class="form-block__item">
                <label For="">Type</label>

                <select class="form-select" id="program-category" name="SelectedCategory"><option value="">Select</option>
<option value="Counselling">Counselling</option>
<option value="Support Groups">Support Groups</option>
<option value="Crisis Lines">Crisis Lines</option>
<option value="Phone Support">Phone Support</option>
<option value="Camps">Camps</option>
<option value="Education">Education</option>
<option value="Other">Other</option>
</select>
            </div>
            <div class="form-block__item">
                <label For="">Province/Territory</label>
                <div class="input-block">

                    <select class="form-select form-input js-provinces item-code" id="program-location" name="SelectedLocation"><option value="">Canada</option>
<option value="Alberta">Alberta</option>
<option value="British Columbia">British Columbia</option>
<option value="Manitoba">Manitoba</option>
<option value="New Brunswick">New Brunswick</option>
<option value="Newfoundland and Labrador">Newfoundland and Labrador</option>
<option value="Prince Edward Island">Prince Edward Island</option>
<option value="Nova Scotia">Nova Scotia</option>
<option value="Quebec">Quebec</option>
<option value="Ontario">Ontario</option>
<option value="Saskatchewan">Saskatchewan</option>
<option value="Yukon">Yukon</option>
<option value="Northwest Territories">Northwest Territories</option>
<option value="Nunavut">Nunavut</option>
</select>

                </div>
            </div>
            <div class="form-block__item">
                <label For="">Postal Code</label>
                <div class="input-block">
                    <input id="postalCode"
                           name="postalCode"
                           type="text"
                           placeholder="code"
                           class="form-input js-provinces item-code" />
                </div>
            </div>

            <div class="form-block__item">
                <label For="">Distance </label>

                <select class="form-select" data-val="true" data-val-number="The field SelectedRadius must be a number." data-val-required="The SelectedRadius field is required." id="program-radius" name="SelectedRadius"><option value="20">20 km</option>
<option value="50">50 km</option>
<option value="100">100 km</option>
<option value="250">250 km</option>
<option selected="selected" value="0">Full Prov/Terr</option>
</select>
            </div>
        </div>
        <div class="form-buttons-container">
            <div class="input-block">
                <button id="submit" type="submit" class="form-submit">
                    Search&nbsp;<i class="fas fa-angle-right"></i>
                </button>
            </div>
            <div class="input-block">
                <button id="reset" type="submit" class="program-reset">
                    Reset
                </button>
            </div>
        </div>
    </form>
</div>
