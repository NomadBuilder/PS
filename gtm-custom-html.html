<!--
  GTM: ONE Custom HTML tag — Living My Culture keeps real header/footer.

  Mount: replaces everything INSIDE the main column div.center (not the first
  .center in the document — LMC can have several; we pick the culture grid column).
  Use a GTM trigger only on the URLs you want (e.g. /culture/?programs&services —
  see PS/README.md). Do not duplicate URL checks in this script.

  Remove the jQuery branch if the host page already loads jQuery 3.x.

  Bump CSS_VER after CSS changes on GitHub Pages so visitors skip stale cache.
-->
<script>
  (function () {
    var BASE = "https://nomadbuilder.github.io/PS/";
    var CSS_VER = "4";
    window.LMC_PROGRAMS_DATA_BASE = BASE;

    function findProgramsMountRoot() {
      var list = document.querySelectorAll("div.center");
      var i;
      for (i = 0; i < list.length; i++) {
        if (list[i].querySelector(".culture-list, .cl-item")) {
          return list[i];
        }
      }
      var scoped =
        document.querySelector("main div.center") ||
        document.querySelector("#content div.center") ||
        document.querySelector("#main div.center") ||
        document.querySelector("article div.center");
      if (scoped) {
        return scoped;
      }
      if (!list.length) {
        return document.querySelector(".center");
      }
      if (list.length === 1) {
        return list[0];
      }
      var best = list[0];
      var bestH = 0;
      for (i = 0; i < list.length; i++) {
        var h = list[i].clientHeight;
        if (h > bestH) {
          bestH = h;
          best = list[i];
        }
      }
      return best;
    }

    var center = findProgramsMountRoot();
    if (!center) {
      console.warn("[LMC programs] No mount root (.center) found; widget not mounted.");
      return;
    }
    if (center.querySelector(".lmc-programs-gtm-root")) {
      return;
    }

    function ensureLink(rel, href, opts) {
      opts = opts || {};
      var sel = 'link[data-lmc-programs][href="' + href.replace(/"/g, "") + '"]';
      if (document.querySelector(sel)) return;
      var l = document.createElement("link");
      l.rel = rel;
      l.href = href;
      l.setAttribute("data-lmc-programs", "1");
      if (opts.integrity) l.integrity = opts.integrity;
      if (opts.crossOrigin) l.crossOrigin = opts.crossOrigin;
      document.head.appendChild(l);
    }

    ensureLink("preconnect", "https://fonts.googleapis.com");
    ensureLink("preconnect", "https://fonts.gstatic.com", { crossOrigin: "anonymous" });
    ensureLink(
      "stylesheet",
      "https://fonts.googleapis.com/css2?family=Capriola&display=swap"
    );
    ensureLink(
      "stylesheet",
      "https://pro.fontawesome.com/releases/v5.10.0/css/all.css",
      {
        integrity:
          "sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p",
        crossOrigin: "anonymous",
      }
    );
    ensureLink("stylesheet", BASE + "programs-services.css?v=" + CSS_VER);

    var WIDGET_HTML =
      '<div class="lmc-programs-page lmc-programs-embed lmc-programs-gtm-root">' +
      '<a class="lmc-skip" href="#program-service">Skip to search and results</a>' +
      '<main class="lmc-widget-main">' +
      '<header class="lmc-programs-hero" id="lmc-programs-hero">' +
      '<h1 class="lmc-programs-hero__title">Programs and Services</h1>' +
      '<p class="lmc-programs-hero__lead">Click on the map or use the search bar below.</p>' +
      "</header>" +
      '<section class="lmc-map-section" aria-label="Canada map">' +
      '<div class="lmc-map-card">' +
      '<div id="map-root"></div>' +
      '<p class="lmc-map-hint">Select a province or territory on the map to filter listings.</p>' +
      "</div>" +
      "</section>" +
      '<div id="program-service" class="program-service">' +
      '<h2 class="h2">Search</h2>' +
      '<div id="search-container"></div>' +
      '<div id="results-container" aria-live="polite"></div>' +
      '<div class="lmc-page-actions">' +
      '<a href="#program-service" class="return-btn">Return to top</a>' +
      '<a href="mailto:canadiangriefalliance@virtualhospice.ca" class="btn-more">Submit a program or service <i class="fas fa-chevron-right" aria-hidden="true"></i></a>' +
      "</div>" +
      "</div>" +
      "</main>" +
      "</div>";

    center.innerHTML = WIDGET_HTML;

    function appendScript(src, opts, onload) {
      opts = opts || {};
      var s = document.createElement("script");
      s.src = src;
      if (opts.integrity) s.integrity = opts.integrity;
      if (opts.crossOrigin) s.crossOrigin = opts.crossOrigin;
      if (opts.defer) s.defer = true;
      if (opts.async) s.async = true;
      s.onload = onload || function () {};
      s.onerror = function () {
        console.error("[LMC programs] Failed to load", src);
      };
      document.head.appendChild(s);
    }

    function loadPrograms() {
      if (document.querySelector("script[data-lmc-programs-map]")) return;
      var s = document.createElement("script");
      s.src = BASE + "programs-services.js";
      s.setAttribute("data-lmc-programs-map", BASE + "canada-map.svg");
      s.defer = true;
      s.onerror = function () {
        console.error("[LMC programs] Failed to load programs-services.js");
      };
      document.head.appendChild(s);
    }

    if (window.jQuery && window.jQuery.fn) {
      loadPrograms();
      return;
    }

    appendScript(
      "https://code.jquery.com/jquery-3.5.1.min.js",
      {
        integrity: "sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=",
        crossOrigin: "anonymous",
      },
      loadPrograms
    );
  })();
</script>
