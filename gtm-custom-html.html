  About Grief blocks cross-origin iframes (X-Frame-Options). Header/footer use
  aboutgrief-chrome.js: fetch + Shadow DOM — not an iframe.

  Remove the jQuery <script> line if the host page already loads jQuery 3.x.
-->
<script>
  window.LMC_PROGRAMS_DATA_BASE = "https://nomadbuilder.github.io/PS/";
</script>
<link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous" />

  <main class="lmc-widget-main">

    </section>

</div>
