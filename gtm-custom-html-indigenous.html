<!--
  GTM: Custom HTML tag — Indigenous-only programs widget.
  Use a trigger that fires ONLY on the page(s) where you want this (not the same URL as the full widget).

  Trigger (Page URL / Page Path — "matches RegEx"), copy the whole line:
  idprograms.*[&?]services|services.*[&?]idprograms|[?&]idps(?:=|&|$|#)

  That adds ?idps, &idps, ?idps=…, etc. to your existing idprograms/services query pairing.

  Differences from gtm-custom-html.html:
  - Root div includes lmc-programs-indigenous-only.
  - Script tag includes data-lmc-programs-mode="indigenous-only" (locks API to Indigenous; strips redundant audience labels).
  - Built-in search: province/territory (map-linked), postal code, and distance only — always Indigenous.
  - Listings: static snapshots for map/national browse; postal/distance searches use aboutgrief.ca API (fallback if snapshot missing).
  - “Submit a program or service” uses mailto:info@virtualhospice.ca (not Canadian Grief Alliance).

  Bump CSS_VER when you publish new programs-services.css to GitHub Pages.
-->
<script>
  (function () {
    var BASE = "https://nomadbuilder.github.io/PS/";
    var CSS_VER = "7";
    window.LMC_INDIGENOUS_PROGRAMS_DATA_BASE = BASE;

    function findProgramsMountRoot() {
      var list = document.querySelectorAll("div.center");
      var i;
      for (i = 0; i < list.length; i++) {
        if (list[i].querySelector(".culture-list, .cl-item")) {
          return list[i];
        }
      }
      var scoped =
        document.querySelector("main div.center") ||
        document.querySelector("#content div.center") ||
        document.querySelector("#main div.center") ||
        document.querySelector("article div.center");
      if (scoped) {
        return scoped;
      }
      if (!list.length) {
        return document.querySelector(".center");
      }
      if (list.length === 1) {
        return list[0];
      }
      var best = list[0];
      var bestH = 0;
      for (i = 0; i < list.length; i++) {
        var h = list[i].clientHeight;
        if (h > bestH) {
          bestH = h;
          best = list[i];
        }
      }
      return best;
    }

    var center = findProgramsMountRoot();
    if (!center) {
      console.warn("[LMC programs Indigenous] No mount root (.center) found; widget not mounted.");
      return;
    }
    if (center.querySelector(".lmc-programs-gtm-root")) {
      return;
    }

    function ensureLink(rel, href, opts) {
      opts = opts || {};
      var sel = 'link[data-lmc-programs][href="' + href.replace(/"/g, "") + '"]';
      if (document.querySelector(sel)) return;
      var l = document.createElement("link");
      l.rel = rel;
      l.href = href;
      l.setAttribute("data-lmc-programs", "1");
      if (opts.integrity) l.integrity = opts.integrity;
      if (opts.crossOrigin) l.crossOrigin = opts.crossOrigin;
      document.head.appendChild(l);
    }

    ensureLink("preconnect", "https://fonts.googleapis.com");
    ensureLink("preconnect", "https://fonts.gstatic.com", { crossOrigin: "anonymous" });
    ensureLink(
      "stylesheet",
      "https://fonts.googleapis.com/css2?family=Capriola&display=swap"
    );
    ensureLink(
      "stylesheet",
      "https://pro.fontawesome.com/releases/v5.10.0/css/all.css",
      {
        integrity:
          "sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p",
        crossOrigin: "anonymous",
      }
    );
    ensureLink("stylesheet", BASE + "programs-services.css?v=" + CSS_VER);

    var WIDGET_HTML =
      '<div class="lmc-programs-page lmc-programs-embed lmc-programs-gtm-root lmc-programs-indigenous-only">' +
      '<a class="lmc-skip" href="#results-container">Skip to listings</a>' +
      '<main class="lmc-widget-main">' +
      '<header class="lmc-programs-hero" id="lmc-programs-hero">' +
      '<h1 class="lmc-programs-hero__title">Indigenous programs and services</h1>' +
      '<p class="lmc-programs-hero__lead">Indigenous programs and services across Canada. Use the map, postal code, or distance to find resources — including national listings.</p>' +
      "</header>" +
      '<section class="lmc-map-section" aria-label="Canada map">' +
      '<div class="lmc-map-card">' +
      '<div id="map-root"></div>' +
      '<p class="lmc-map-hint">Select a province or territory on the map to filter these Indigenous listings.</p>' +
      "</div>" +
      "</section>" +
      '<div id="program-service" class="program-service">' +
      '<h2 class="h2">Find programs near you</h2>' +
      '<div id="search-container"></div>' +
      '<div id="results-container" aria-live="polite"></div>' +
      '<div class="lmc-page-actions">' +
      '<a href="#results-container" class="return-btn">Return to top</a>' +
      '<a href="mailto:info@virtualhospice.ca" class="btn-more">Submit a program or service <i class="fas fa-chevron-right" aria-hidden="true"></i></a>' +
      "</div>" +
      "</div>" +
      "</main>" +
      "</div>";

    center.innerHTML = WIDGET_HTML;

    function appendScript(src, opts, onload) {
      opts = opts || {};
      var s = document.createElement("script");
      s.src = src;
      if (opts.integrity) s.integrity = opts.integrity;
      if (opts.crossOrigin) s.crossOrigin = opts.crossOrigin;
      if (opts.defer) s.defer = true;
      if (opts.async) s.async = true;
      s.onload = onload || function () {};
      s.onerror = function () {
        console.error("[LMC programs Indigenous] Failed to load", src);
      };
      document.head.appendChild(s);
    }

    function loadPrograms() {
      if (document.querySelector("script[data-lmc-programs-map]")) return;
      var s = document.createElement("script");
      s.src = BASE + "programs-services.js";
      s.setAttribute("data-lmc-programs-map", BASE + "canada-map.svg");
      s.setAttribute("data-lmc-programs-mode", "indigenous-only");
      s.setAttribute("data-lmc-indigenous-programs-static-base", BASE);
      s.defer = true;
      s.onerror = function () {
        console.error("[LMC programs Indigenous] Failed to load programs-services.js");
      };
      document.head.appendChild(s);
    }

    if (window.jQuery && window.jQuery.fn) {
      loadPrograms();
      return;
    }

    appendScript(
      "https://code.jquery.com/jquery-3.5.1.min.js",
      {
        integrity: "sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=",
        crossOrigin: "anonymous",
      },
      loadPrograms
    );
  })();
</script>
