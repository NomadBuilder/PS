<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Programs and services</title>
  <meta name="description" content="Find grief and bereavement programs and services across Canada." />
  <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous" />
  <link rel="stylesheet" href="programs-services.css" />
  <script>
    window.LMC_PROGRAMS_DATA_BASE = new URL(".", window.location.href).href;
  </script>
</head>
<body class="lmc-programs-page lmc-programs-embed">
  <a class="lmc-skip" href="#program-service">Skip to search and results</a>

  <div id="lmc-chrome-header" class="lmc-chrome-header" aria-busy="true" aria-label="About Grief site header"></div>

  <main class="lmc-widget-main">
    <h1 class="lmc-visually-hidden">Programs and services directory</h1>

    <section class="lmc-map-section" aria-label="Canada map">
      <div class="lmc-map-card">
        <div id="map-root"></div>
        <p class="lmc-map-hint">Select a province or territory on the map to filter listings.</p>
      </div>
    </section>

    <div id="program-service" class="program-service">
      <h2 class="h2">Search</h2>
      <div id="search-container"></div>
      <div id="results-container" aria-live="polite"></div>

      <div class="lmc-page-actions">
        <a href="#program-service" class="return-btn">Return to top</a>
        <a href="mailto:canadiangriefalliance@virtualhospice.ca" class="btn-more">Submit a program or service <i class="fas fa-chevron-right" aria-hidden="true"></i></a>
      </div>
    </div>
  </main>

  <div id="lmc-chrome-footer" class="lmc-chrome-footer" aria-busy="true" aria-label="About Grief site footer"></div>

  <script src="aboutgrief-chrome.js" defer></script>
  <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous" defer></script>
  <script src="programs-services.js" data-lmc-programs-map="canada-map.svg" defer></script>
</body>
</html>
